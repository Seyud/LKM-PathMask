name: Build PathMask KernelSU Module (DDK)

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g. android13-5.15)'
        required: true
        type: string
      ddk_image:
        description: 'DDK image name (without tag), e.g. ghcr.io/ylarod/ddk or ghcr.io/ylarod/ddk-min'
        required: false
        default: 'ghcr.io/ylarod/ddk'
        type: string
      ddk_tag:
        description: 'DDK image tag suffix. Use the KMI name alone (e.g. android13-5.15) for ddk:KMI, or KMI-DATE (e.g. android13-5.15-20260313) for ddk-min:KMI-DATE.'
        required: false
        default: ''
        type: string

jobs:
  build-pathmask:
    name: Build pathmask for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.ddk_image }}:${{ inputs.ddk_tag != '' && inputs.ddk_tag || inputs.kmi }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Build pathmask.ko
      shell: bash
      run: |
        set -eu

        echo "=== Container info ==="
        cat /etc/os-release 2>/dev/null | head -n 2 || true
        uname -a || true
        # Some ddk images expose envsetup.sh that pins KDIR/CC/etc. Source it
        # if present so we work the same way the official template does.
        for env_sh in \
          /opt/ddk/envsetup.sh \
          /opt/ddk/scripts/envsetup.sh \
          /workspace/envsetup.sh \
          /envsetup.sh; do
          if [ -f "$env_sh" ]; then
            echo "Sourcing $env_sh"
            # shellcheck disable=SC1090
            . "$env_sh"
            break
          fi
        done

        # Some images export DDK_TARGET / select_target style helpers.
        if command -v ddk-select >/dev/null 2>&1; then
          echo "ddk-select ${{ inputs.kmi }}"
          ddk-select "${{ inputs.kmi }}" || true
        fi

        echo
        echo "=== Toolchain / KDIR ==="
        echo "KDIR=${KDIR:-(unset)}"
        if [ -n "${KDIR:-}" ]; then
          ls -la "$KDIR" 2>/dev/null | head -n 20 || true
          if [ -f "$KDIR/Module.symvers" ]; then
            SYMVERS_LINES=$(wc -l < "$KDIR/Module.symvers" || echo 0)
            echo "Module.symvers lines: $SYMVERS_LINES"
            head -n 3 "$KDIR/Module.symvers" || true
          else
            echo "WARNING: $KDIR/Module.symvers not found"
          fi
          if [ -f "$KDIR/include/config/kernel.release" ]; then
            echo -n "kernel.release: "
            cat "$KDIR/include/config/kernel.release"
          fi
        fi
        which clang || true
        clang --version 2>&1 | head -n 1 || true

        echo
        echo "=== Building pathmask.ko for KMI: ${{ inputs.kmi }} ==="
        cd kernel

        # Strategy to coax modpost on the DDK kernel into producing a
        # ko with a populated __versions section:
        #
        #   * The Kbuild fragment in this directory filters LTO/CFI
        #     flags out of KBUILD_CFLAGS so clang emits real ELF
        #     relocations instead of bitcode + cfi jump tables.
        #
        #   * KDIR/include/config/auto.conf holds the .config values
        #     modpost actually reads. The DDK images bake
        #     CONFIG_SECTION_MISMATCH_WARN_ONLY=n in there, which is
        #     why our previous attempts at warn-only kept getting
        #     overridden. Patch auto.conf in-place to flip it to y.
        #     This lets modpost finish even when clang's CFI artifacts
        #     leak through.
        AUTOCONF="$KDIR/include/config/auto.conf"
        if [ -f "$AUTOCONF" ]; then
          if grep -q '^CONFIG_SECTION_MISMATCH_WARN_ONLY=' "$AUTOCONF"; then
            sed -i 's|^CONFIG_SECTION_MISMATCH_WARN_ONLY=.*|CONFIG_SECTION_MISMATCH_WARN_ONLY=y|' "$AUTOCONF"
          else
            echo 'CONFIG_SECTION_MISMATCH_WARN_ONLY=y' >> "$AUTOCONF"
          fi
          echo "auto.conf section-mismatch knob:"
          grep '^CONFIG_SECTION_MISMATCH_WARN_ONLY=' "$AUTOCONF" || true
        else
          echo "WARNING: $AUTOCONF not found; modpost section-mismatch override may not stick"
        fi

        # Real fix path. The Ylarod DDK image stripped scripts/Makefile.modpost
        # so we cannot patch the modpost rule there. Instead, hijack the
        # modpost binary itself: rename the real one and put a wrapper at
        # scripts/mod/modpost that fixes up its argv before exec'ing the
        # real binary.
        #
        # Specifically, we want to insert "-i $KDIR/Module.symvers" into
        # the argv. modpost reads each -i file as a symvers index and
        # uses it to look up CRCs for referenced symbols. The DDK rule
        # passes "-o ./Module.symvers -i Module.symvers" -- both point at
        # the same path, modpost truncates on -o open, the -i read finds
        # an empty file, ____versions[] ends up empty.
        #
        # Our wrapper inserts an absolute path to the kernel symvers
        # AFTER the existing -i so modpost has a real index to consult.
        # We do NOT remove the original -i so we don't change anything
        # else about the build.
        REAL_MODPOST="$KDIR/scripts/mod/modpost"
        if [ -f "$REAL_MODPOST" ] && [ ! -f "${REAL_MODPOST}.real" ]; then
          mv "$REAL_MODPOST" "${REAL_MODPOST}.real"
          # Build the wrapper without a heredoc -- YAML's `run: |` would
          # break on a body line whose indent is shallower than the
          # surrounding shell commands.
          {
            printf '%s\n' '#!/bin/sh'
            printf '%s\n' '# pathmask CI shim. Inserts -i KDIR/Module.symvers ahead of the'
            printf '%s\n' '# original argv so modpost has a vmlinux CRC index to consult.'
            printf '%s\n' 'KDIR_SYMVERS="${KDIR_SYMVERS:-}"'
            printf '%s\n' 'if [ -n "$KDIR_SYMVERS" ] && [ -s "$KDIR_SYMVERS" ]; then'
            printf '%s\n' '    exec "$0.real" -i "$KDIR_SYMVERS" "$@"'
            printf '%s\n' 'else'
            printf '%s\n' '    exec "$0.real" "$@"'
            printf '%s\n' 'fi'
          } > "$REAL_MODPOST"
          chmod +x "$REAL_MODPOST"
          echo "Installed modpost wrapper at $REAL_MODPOST"
          ls -la "$REAL_MODPOST" "${REAL_MODPOST}.real"
          echo "--- wrapper contents ---"
          cat "$REAL_MODPOST"
          echo "--- end wrapper ---"
        fi
        export KDIR_SYMVERS="$KDIR/Module.symvers"
        echo "KDIR_SYMVERS=$KDIR_SYMVERS"

        EXTRA_SYMVERS=""

        # KCFLAGS is the Kbuild-blessed "user cflags" append knob, applied
        # AFTER everything else. Setting -fno-lto / -fno-sanitize=cfi here
        # guarantees they win over any earlier -flto=thin / -fsanitize=cfi
        # that auto.conf-driven Kbuild assembly might inject. Filtering in
        # kernel/Kbuild has not been enough on the 5.10 DDK toolchain
        # because CC_FLAGS_LTO is appended *after* our Kbuild fragment
        # is read.
        export KCFLAGS="-fno-lto -fno-sanitize=cfi"
        echo "KCFLAGS=$KCFLAGS"

        KBUILD_MODPOST_WARN=1 \
        CONFIG_SECTION_MISMATCH_WARN_ONLY=y \
        CONFIG_KSU=m CC=clang \
        KBUILD_EXTRA_SYMBOLS="$EXTRA_SYMVERS" \
          make
        echo "=== Build completed ==="

        echo
        echo "=== Compiler command actually used (from .pathmask.o.cmd) ==="
        if [ -f .pathmask.o.cmd ]; then
          # The .cmd file is a single very long line; wrap for readability.
          tr ' ' '\n' < .pathmask.o.cmd | head -n 200
          echo "..."
          echo "-- LTO/CFI flags seen by cc --"
          tr ' ' '\n' < .pathmask.o.cmd | grep -E -- '-flto|sanitize|fvisibility|fsplit-lto-unit|cfi' || echo "(none -- good)"
        else
          echo "(.pathmask.o.cmd not present)"
        fi

        if [ -f .pathmask.lto.o.cmd ]; then
          echo
          echo "=== Linker command for the .lto.o step ==="
          tr ' ' '\n' < .pathmask.lto.o.cmd | head -n 60
        fi

        echo
        echo "=== file(1) verdict on intermediate objects ==="
        for f in pathmask.o pathmask.lto.o pathmask.ko; do
          if [ -f "$f" ]; then
            echo "$f: $(file "$f")"
          fi
        done

        # Pick readelf for the diagnostics below.
        if command -v llvm-readelf >/dev/null 2>&1; then RE2=llvm-readelf
        elif command -v readelf >/dev/null 2>&1; then RE2=readelf
        else RE2=""; fi

        echo
        echo "=== Undefined (UND) symbols in pathmask.lto.o ==="
        echo "(modpost looks these up in KDIR/Module.symvers to populate __versions)"
        if [ -n "$RE2" ]; then
          $RE2 -s pathmask.lto.o 2>&1 | awk '/UND/ && $NF !~ /^$/ {print $NF}' | sort -u | head -n 80
          echo "..."
          echo "Total UND symbols: $($RE2 -s pathmask.lto.o 2>&1 | awk '/UND/ {n++} END {print n+0}')"
        fi

        echo
        echo "=== pathmask.mod.c (modpost-generated CRC stub) ==="
        if [ -f pathmask.mod.c ]; then
          echo "-- file size --"
          wc -l pathmask.mod.c
          echo "-- ____versions array --"
          awk '/____versions/{flag=1} flag; /^};/{if(flag){print; flag=0}}' pathmask.mod.c
          echo "-- end of file --"
          tail -n 30 pathmask.mod.c
        else
          echo "(pathmask.mod.c not present)"
        fi

        echo
        echo "=== modpost cmdline (from .Module.symvers.cmd) ==="
        if [ -f .Module.symvers.cmd ]; then
          cat .Module.symvers.cmd
        else
          echo "(no .Module.symvers.cmd)"
        fi

        echo
        echo "=== Sample lookup: are pathmask's symbols in KDIR/Module.symvers? ==="
        for sym in register_kretprobe kfree _printk printk kmalloc kstrdup; do
          if grep -q "[[:space:]]${sym}[[:space:]]" "$KDIR/Module.symvers" 2>/dev/null; then
            crc=$(grep "[[:space:]]${sym}[[:space:]]" "$KDIR/Module.symvers" | head -n 1 | awk '{print $1}')
            echo "  $sym -> $crc"
          else
            echo "  $sym -> NOT in KDIR/Module.symvers"
          fi
        done

        mkdir -p /github/workspace/out
        OUTPUT_NAME="${{ inputs.kmi }}_pathmask.ko"

        # === IMMEDIATE post-build inspection (BEFORE any strip) ===
        # If __versions is already empty here, the problem is in modpost
        # or in the kernel headers, not in any later strip step.
        echo
        echo "=== ko inspection IMMEDIATELY after make (no strip yet) ==="
        ls -la pathmask.ko
        if command -v llvm-readelf >/dev/null 2>&1; then RE=llvm-readelf
        elif command -v readelf >/dev/null 2>&1; then RE=readelf
        else RE=""; fi

        if [ -n "$RE" ]; then
          echo
          echo "-- sections matching __versions / __ksymtab / modinfo --"
          $RE -SW pathmask.ko 2>&1 | grep -E '__versions|__ksymtab|__kcrctab|modinfo|note|\.gnu' || true
          echo
          echo "-- full section table head --"
          $RE -SW pathmask.ko 2>&1 | head -n 60
        fi

        if command -v modinfo >/dev/null 2>&1; then
          echo
          echo "-- modinfo (full) --"
          modinfo pathmask.ko || true
          echo
          echo "-- modversion line count --"
          modinfo pathmask.ko 2>/dev/null | grep -c '^modversion:' || true
        fi

        echo
        echo "-- Module.symvers produced for our module --"
        ls -la Module.symvers 2>/dev/null || true
        head -n 20 Module.symvers 2>/dev/null || true

        echo
        echo "-- compile-time .config bits relevant to modversions --"
        if [ -n "${KDIR:-}" ] && [ -f "$KDIR/.config" ]; then
          grep -E '^(CONFIG_MODULES|CONFIG_MODVERSIONS|CONFIG_TRIM_UNUSED_KSYMS|CONFIG_MODULE_REL|CONFIG_DEBUG_INFO_BTF)' "$KDIR/.config" || true
        fi
        echo "=========================================================="

        cp pathmask.ko "/github/workspace/out/$OUTPUT_NAME"

        echo
        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"

        # IMPORTANT: do NOT run `llvm-strip -d` here. Even though -d is
        # nominally --strip-debug, on an already-modposted ko it can
        # remove sections we still need. We keep the unstripped ko (the
        # full ABI sanity gate runs on it next).
        echo "=== Skipping llvm-strip to preserve __versions ==="
        ls -la "/github/workspace/out/$OUTPUT_NAME"

    - name: Verify ko ABI compatibility for ${{ inputs.kmi }}
      run: |
        set -eu
        KO="/github/workspace/out/${{ inputs.kmi }}_pathmask.ko"
        KMI="${{ inputs.kmi }}"
        REPORT="/github/workspace/out/${{ inputs.kmi }}_verify-report.txt"

        {
          echo "=== Inspecting $KO ==="
          ls -la "$KO"
        } | tee "$REPORT"

        # Pick whatever modinfo / readelf / strings the container has.
        for cmd in modinfo /usr/bin/modinfo /usr/sbin/modinfo; do
          if command -v "$cmd" >/dev/null 2>&1; then MODINFO="$cmd"; break; fi
        done
        for cmd in llvm-readelf readelf; do
          if command -v "$cmd" >/dev/null 2>&1; then READELF="$cmd"; break; fi
        done
        for cmd in llvm-strings strings; do
          if command -v "$cmd" >/dev/null 2>&1; then STRINGS="$cmd"; break; fi
        done

        FAIL=0

        # Helper: convert "0x000000" / "0xABCD" / "00ABCD" to decimal.
        # Returns 0 if input is empty or unparseable. POSIX-only, no local,
        # no ksh extended globs.
        hex_to_dec() {
          h="${1#0x}"
          h="${h#0X}"
          while [ "${h#0}" != "$h" ] && [ -n "$h" ]; do h="${h#0}"; done
          if [ -z "$h" ]; then echo 0; return; fi
          case "$h" in
            *[!0-9a-fA-F]*) echo 0; return;;
          esac
          printf '%d\n' "0x$h"
        }

        # 1. vermagic must mention this KMI tag and must not contain "-dirty".
        # The android-common kernel sets LOCALVERSION to something like
        # "-android13-9", which ends up in vermagic. A ko built against a
        # mainline / non-KMI tree (e.g. "5.15.202_r00-dirty") would silently
        # produce a binary that looks like a GKI module but is not one.
        KMI_TAG="$(printf '%s' "$KMI" | cut -d- -f1)" # e.g. "android13"
        VM=""
        if [ -n "${MODINFO:-}" ]; then
          VM="$($MODINFO "$KO" 2>/dev/null | awk '/^vermagic:/ {sub(/^vermagic:[[:space:]]+/, ""); print; exit}')"
        fi
        if [ -z "$VM" ] && [ -n "${STRINGS:-}" ]; then
          VM="$($STRINGS "$KO" | grep -m1 '^vermagic=' | sed 's/^vermagic=//')"
        fi
        {
          echo
          echo "vermagic: $VM"
        } | tee -a "$REPORT"

        case "$VM" in
          *"${KMI_TAG}-"*)
            echo "PASS: vermagic carries KMI tag '${KMI_TAG}-'" | tee -a "$REPORT"
          ;;
          *)
            {
              echo "FAIL: vermagic does not contain KMI tag '${KMI_TAG}-'"
              echo "      this ko was likely built against a non-GKI kernel tree."
            } | tee -a "$REPORT"
            FAIL=1
          ;;
        esac

        case "$VM" in
          *-dirty*|*"_r00"*)
            {
              echo "WARN: vermagic contains a -dirty / _r00 marker."
              echo "      this is a Ylarod DDK convention, not necessarily"
              echo "      a problem -- the kernel's same_magic() skips the"
              echo "      version prefix when both sides have modversions."
              echo "      We do not fail the build on this alone."
            } | tee -a "$REPORT"
          ;;
        esac

        # 2. __versions section must be non-empty (modversions CRC table).
        VS_HEX="0x0"
        if [ -n "${READELF:-}" ]; then
          # Try column 6 first (typical -SW layout: [Nr] Name Type Address Off Size ...)
          VS_HEX="$($READELF -SW "$KO" 2>/dev/null | awk '/[[:space:]]__versions[[:space:]]/ {print $6; exit}')"
          [ -z "$VS_HEX" ] && VS_HEX="0"
          # Fallback: scan the line and pick first 6+ digit hex token.
          if [ "$(hex_to_dec "$VS_HEX")" -eq 0 ]; then
            VS_HEX="$($READELF -SW "$KO" 2>/dev/null | awk '/__versions/ {for (i=1; i<=NF; i++) if ($i ~ /^[0-9a-fA-F]{6,}$/) {print $i; exit}}')"
            [ -z "$VS_HEX" ] && VS_HEX="0"
          fi
        fi
        VS_DEC="$(hex_to_dec "$VS_HEX")"
        {
          echo
          echo "__versions size: 0x${VS_HEX#0x} ($VS_DEC bytes)"
        } | tee -a "$REPORT"

        if [ "$VS_DEC" -le 0 ]; then
          {
            echo "FAIL: __versions section is empty; ko has no modversions CRC table."
            echo "      such a ko bypasses the per-symbol CRC check on the device,"
            echo "      and on hardened OEM kernels can trip CFI/SCS during probe"
            echo "      registration -- causing instant reboots with no dmesg trace."
          } | tee -a "$REPORT"
          FAIL=1
        else
          echo "PASS: __versions section is non-empty ($VS_DEC bytes)" | tee -a "$REPORT"
        fi

        # 3. modinfo should show at least one modversion: line.
        if [ -n "${MODINFO:-}" ]; then
          MV_COUNT="$($MODINFO "$KO" 2>/dev/null | grep -c '^modversion:' || true)"
          {
            echo
            echo "modversion: lines = $MV_COUNT"
          } | tee -a "$REPORT"
          if [ "$MV_COUNT" -lt 1 ]; then
            echo "FAIL: modinfo reports no modversion: lines." | tee -a "$REPORT"
            FAIL=1
          else
            echo "PASS: modinfo reports $MV_COUNT modversion entries" | tee -a "$REPORT"
          fi
        fi

        # Capture the full modinfo + readelf summary for offline analysis.
        {
          echo
          echo "=== modinfo (full) ==="
          [ -n "${MODINFO:-}" ] && $MODINFO "$KO" 2>&1 || echo "(no modinfo)"
          echo
          echo "=== readelf -SW (sections) ==="
          [ -n "${READELF:-}" ] && $READELF -SW "$KO" 2>&1 || echo "(no readelf)"
          echo
          echo "=== relevant strings ==="
          if [ -n "${STRINGS:-}" ]; then
            $STRINGS "$KO" | grep -E '^(vermagic|name|description|depends|srcversion)=' || true
          fi
        } >> "$REPORT"

        if [ "$FAIL" -ne 0 ]; then
          echo "::error::ko ABI sanity gate failed for $KMI; refusing to publish a binary that may brick devices."
          echo "::notice::See $REPORT (also uploaded as artifact) for full details."
          exit 1
        fi

        echo "=== ABI sanity gate PASSED for $KMI ==="

    - name: Upload PathMask artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-pathmask
        path: |
          /github/workspace/out/${{ inputs.kmi }}_pathmask.ko
          /github/workspace/out/${{ inputs.kmi }}_verify-report.txt
        if-no-files-found: warn
