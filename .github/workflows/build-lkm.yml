name: Build PathMask for All KMI Targets
on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lkm:
    strategy:
      # don't cancel surviving matrix legs when one fails; we want
      # to know which KMIs pass the new sanity gate
      fail-fast: false
      matrix:
        include:
          # 默认走 ghcr.io/ylarod/ddk:<KMI>，这是 Ylarod/ddk README 推荐的
          # tag 形式，里面挂的是真正的 android-common -lts 内核源码。
          # 之前我们用的是 ddk-min:<KMI>-20260313，那个 tag 里的 5.15
          # 源码标记为 "_r00-dirty" 且不含 modversions 表，新加的 ABI
          # sanity gate 会让它 fail。
          #
          # 单 KMI 想换镜像或固定日期 tag 时，把对应行加上 ddk_image 或
          # ddk_tag 字段，例如：
          #
          #   - kmi: android13-5.15
          #     ddk_image: 'ghcr.io/ylarod/ddk-min'
          #     ddk_tag:   'android13-5.15-20260313'
          - kmi: android12-5.10
          - kmi: android13-5.10
          - kmi: android13-5.15
          - kmi: android14-5.15
          - kmi: android14-6.1
          - kmi: android15-6.6
          - kmi: android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_image: ${{ matrix.ddk_image || 'ghcr.io/ylarod/ddk' }}
      ddk_tag:   ${{ matrix.ddk_tag   || '' }}

  publish-release:
    name: Publish module zips to GitHub Release
    needs: build-lkm
    # Only publish from main or version tags. Dev branches build + verify
    # ABI but never publish, so testing branches cannot accidentally
    # overwrite the pathmask-latest tag that real users depend on.
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p release-upload
          find release-assets -type f -name '*_pathmask.ko' -exec cp {} release-upload/ \;

          found_ko=0
          for ko in release-upload/*_pathmask.ko; do
            [ -e "$ko" ] || continue
            found_ko=1
            base="$(basename "$ko" _pathmask.ko)"
            update_json_url="https://raw.githubusercontent.com/Andrea-lyz/LKM-PathMask/main/update/${base}.json"
            UPDATE_JSON_URL="$update_json_url" sh ./tools/package_ksu.sh "$ko" "release-upload/${base}_pathmask-ksu.zip"
          done

          if [ "$found_ko" -eq 0 ]; then
            echo "No PathMask .ko artifacts found." >&2
            exit 1
          fi

          ls -la release-upload

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            TITLE="PathMask ${GITHUB_REF_NAME}"
            PRERELEASE_FLAG=""
          else
            TAG="pathmask-latest"
            TITLE="PathMask latest"
            PRERELEASE_FLAG="--prerelease"
            git tag -f "$TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG" --force
          fi

          NOTES="Automated PathMask build for ${GITHUB_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" $PRERELEASE_FLAG --latest=false
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" $PRERELEASE_FLAG --latest=false
          fi

          gh release upload "$TAG" release-upload/* --clobber
